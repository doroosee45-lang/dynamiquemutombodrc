version: '3.9'

services:
  mongodb:
    image: mongo:7.0
    container_name: dynamique-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-DynamiqueSecure2026!}
      MONGO_INITDB_DATABASE: dynamique_rdc
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - dynamique-net
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dynamique-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    networks:
      - dynamique-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dynamique-backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://admin:${MONGO_PASSWORD:-DynamiqueSecure2026!}@mongodb:27017/dynamique_rdc?authSource=admin
      - REDIS_URL=redis://redis:6379
      - AI_SERVICE_URL=http://ai-service:8000
    ports:
      - "4000:4000"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dynamique-net
    volumes:
      - uploads_data:/app/uploads

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: dynamique-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    networks:
      - dynamique-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
        - VITE_SOCKET_URL=
    container_name: dynamique-frontend
    restart: unless-stopped
    networks:
      - dynamique-net

  nginx:
    image: nginx:1.25-alpine
    container_name: dynamique-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - dynamique-net

volumes:
  mongodb_data:
  uploads_data:

networks:
  dynamique-net:
    driver: bridge
