services:
  # ══════════════════════════════════════════════════════
  # BACKEND — Web Service (Node.js)
  # URL : https://dynamiquemutombodrc-1.onrender.com
  # ══════════════════════════════════════════════════════
  - type: web
    name: dynamiquemutombodrc-1
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: FRONTEND_URL
        value: https://dynamiquemutombodrc.onrender.com
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: 587
      - key: EMAIL_FROM
        value: "Dynamique RDC <no-reply@dynamique-rdc.cd>"
      - key: MONGODB_URI
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: CONTACT_EMAIL
        sync: false

  # ══════════════════════════════════════════════════════
  # FRONTEND — Static Site (React + Vite)
  # URL : https://dynamiquemutombodrc.onrender.com
  # ══════════════════════════════════════════════════════
  - type: static
    name: dynamiquemutombodrc
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://dynamiquemutombodrc-1.onrender.com/api
      - key: VITE_SOCKET_URL
        value: https://dynamiquemutombodrc-1.onrender.com
