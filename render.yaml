services:
  # ── Backend API (Web Service) ────────────────────────────────────────
  - type: web
    name: dynamique-rdc-api
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: MONGODB_URI
        sync: false
      - key: FRONTEND_URL
        value: https://dynamique-rdc-frontend.onrender.com
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: 587
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_FROM
        value: "Dynamique RDC <no-reply@dynamique-rdc.cd>"
      - key: CONTACT_EMAIL
        sync: false

  # ── Frontend (Static Site) ───────────────────────────────────────────
  - type: static
    name: dynamique-rdc-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    routes:
      # SPA — toutes les routes redirigent vers index.html
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://dynamiquemutombodrc.onrender.com/api
      - key: VITE_SOCKET_URL
        value: https://dynamiquemutombodrc.onrender.com
